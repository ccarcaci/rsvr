# docker-compose.dokploy.yml — rsvr application stack for Dokploy deployment
#
# This compose file uses pre-built Docker images instead of building from source.
# Images must be built locally and available to the Dokploy container via Docker socket.
#
# Build images locally with:
#   make build_images
#
# Deploy to Dokploy with:
#   make deploy
#
# Network topology
# ─────────────────────────────────────────────────────────────────────────────
# All services join `dokploy-network`, the bridge network created by the
# local_infra/Makefile start target. Traefik — running as a separate container
# managed by Dokploy — watches this network for labelled services and routes
# external HTTPS traffic to them.
#
# Internal service-to-service communication uses Docker DNS names:
#   whap → rsvr  :  http://rsvr:3000/channels/whatsapp/webhook
#
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
# rsvr-data      — SQLite database for rsvr (/app/data inside the container)
# whap-templates — Optional message templates for the whap mock server
#
# Both volumes are named (Docker-managed) so data survives container restarts
# and image upgrades without needing a bind mount or a host path.
#
# Configuration
# ─────────────────────────────────────────────────────────────────────────────
# src/config/args.ts reads ALL config exclusively from CLI arguments via
# parseArgs(). No environment variables are used for application config.
#
# All nine values (port, database_path, and the seven secret keys) are passed
# in the `command:` block below. Setting any of them as environment variables
# in a compose `environment:` block has no effect on the running app.
#
# Default values in the `command:` block are the same mock strings used by
# `make dev` / `make start` locally. Override for production by supplying the
# real value in Dokploy's "Environment" panel, a local `.env.local` file
# (`docker compose --env-file .env.local up`), or inline on the CLI
# (KEY=value docker compose up). Docker Compose will substitute the value into
# the command string via `${KEY:-default}` syntax.

---
name: rsvr

services:

  # ── rsvr ──────────────────────────────────────────────────────────────────
  # Main reservation service. Handles WhatsApp and Telegram messages, runs the
  # Claude Opus agent loop, and exposes a REST API for booking management.
  #
  # Image: rsvr:latest (built locally via: make build_images)
  # User:  rsvr (UID 1001, non-root)
  rsvr:
    image: rsvr:latest

    # Explicit container name makes it reachable on the network by a stable DNS
    # name and simplifies log tailing and exec commands.
    container_name: rsvr

    restart: unless-stopped

    # ── CLI arguments ────────────────────────────────────────────────────────
    # args.ts uses parseArgs() and reads ALL nine config values exclusively
    # from CLI arguments — not from process.env. Each required flag must be
    # present and non-empty or the process throws "Missing required CLI args"
    # at startup. port and database_path have embedded defaults (3000 and
    # ./data/rsvr.db) but are passed explicitly here for transparency.
    #
    # Default values are the same mock strings used by the Makefile MOCK_ARGS.
    # Override for production via Dokploy's "Environment" panel: set the
    # corresponding environment variable (e.g. TELEGRAM_BOT_TOKEN=real_token)
    # and it will be substituted into the command string by Docker Compose.
    command: >
      --port                     ${PORT:-3000}
      --database_path            ${DATABASE_PATH:-./data/rsvr.db}
      --telegram_bot_token       ${TELEGRAM_BOT_TOKEN:-mock_telegram_bot_token}
      --whatsapp_verify_token    ${WHATSAPP_VERIFY_TOKEN:-mock_whatsapp_verify_token}
      --whatsapp_access_token    ${WHATSAPP_ACCESS_TOKEN:-mock_whatsapp_access_token}
      --whatsapp_phone_number_id ${WHATSAPP_PHONE_NUMBER_ID:-mock_whatsapp_phone_number_id}
      --anthropic_api_key        ${ANTHROPIC_API_KEY:-mock_anthropic_api_key}
      --openai_api_key           ${OPENAI_API_KEY:-mock_openai_api_key}
      --internal_api_key         ${INTERNAL_API_KEY:-mock_internal_api_key}
      --graph_api_base           ${GRAPH_API_BASE:-http://whap:3010/v23.0}

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Named volume backed by Podman/Docker — survives container replacement.
      - rsvr-data:/app/data

    # ── Networking ───────────────────────────────────────────────────────────
    networks:
      - dokploy-network

    # ── Health check ─────────────────────────────────────────────────────────
    # /health performs a live SQLite ping. A 200 response means both the HTTP
    # server and the database are operational.
    # curl is installed in the rsvr image (debian:bookworm-slim does not include
    # curl or wget by default; see Dockerfile runtime stage).
    # --fail causes curl to exit non-zero on HTTP 4xx/5xx responses.
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${PORT:-3000}/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── whap ──────────────────────────────────────────────────────────────────
  # WhatsApp Business Cloud API mock. Emulates the Meta Cloud API endpoints
  # locally so the rsvr app can send and receive WhatsApp messages without a
  # real Meta Business account.
  #
  # Image: whap:latest (built locally via: make build_images)
  # User:  whap (UID 1001, non-root)
  #
  # whap forwards incoming message events to rsvr's webhook endpoint via the
  # Docker internal network, so no public DNS or TLS is required for this path.
  whap:
    image: whap:latest

    container_name: whap

    restart: unless-stopped

    # ── Dependency ordering ───────────────────────────────────────────────────
    # whap must be able to reach rsvr's webhook immediately on startup.
    # depends_on with condition: service_healthy ensures rsvr is fully up (health
    # check passing) before whap starts forwarding events.
    depends_on:
      rsvr:
        condition: service_healthy

    # ── Environment variables ────────────────────────────────────────────────
    environment:
      # WEBHOOK_URL — where whap forwards incoming message notifications.
      # Uses Docker DNS to reach the rsvr container on the shared network.
      # The path matches the WhatsApp webhook route registered in
      # src/channels/whatsapp/webhook.ts.
      WEBHOOK_URL: ${WHAP_WEBHOOK_URL:-http://rsvr:3000/webhook/whatsapp}

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Optional: mount custom message templates into the whap server.
      - whap-templates:/app/templates

    # ── Traefik labels ───────────────────────────────────────────────────────
    # Dokploy injects Host/rule/entrypoint labels automatically but defaults
    # the backend port to 3000 when no ports: block is present in the service.
    # whap listens on 3010, so we declare the server port explicitly here.
    # Dokploy merges labels; a label already present in the compose file is
    # not overridden by Dokploy's auto-injection.
    labels:
      - "traefik.http.services.rsvr-whap.loadbalancer.server.port=3010"

    # ── Networking ───────────────────────────────────────────────────────────
    networks:
      - dokploy-network

    # ── Health check ─────────────────────────────────────────────────────────
    # /status returns JSON with uptime and message counts.
    # curl is installed in the whap runtime image (Dockerfile_whap runtime stage).
    # --fail causes curl to exit non-zero on HTTP 4xx/5xx responses.
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

# ── Volumes ────────────────────────────────────────────────────────────────────
# Named volumes are managed by Docker/Podman. They persist across `down`/`up`
# cycles and can be inspected with `docker volume inspect <name>`.
# To back up the SQLite database: `docker run --rm -v rsvr-data:/data -v
# $(pwd):/backup alpine tar czf /backup/rsvr-data.tar.gz -C /data .`
volumes:
  rsvr-data:
    # driver: local is the default; declared explicitly for clarity.
    driver: local

  whap-templates:
    driver: local
